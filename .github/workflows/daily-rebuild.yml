name: Daily rebuild

# Triggers a Cloudflare Pages rebuild every morning at 01:00 UTC (02:00 BST / 02:00 GMT).
# This ensures past events are removed from the site the morning after they end,
# since events are filtered by date at build time.

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC daily
  workflow_dispatch:       # allows manual trigger from GitHub Actions UI

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "CF_DEPLOY_HOOK secret is not set."
            echo ""
            echo "To complete setup:"
            echo "1. Cloudflare Dashboard → Pages → walton-on-thames → Settings → Builds & deployments → Deploy hooks"
            echo "2. Create a hook named 'Daily rebuild' on branch 'main', copy the URL"
            echo "3. GitHub repo → Settings → Secrets and variables → Actions → New secret"
            echo "   Name: CF_DEPLOY_HOOK  Value: <the URL from step 2>"
            exit 0
          fi
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$DEPLOY_HOOK")
          echo "Cloudflare Pages deploy triggered — HTTP $HTTP"
          [ "$HTTP" = "200" ] || exit 1
